; =============================================================================
; php.ini overrides for Laravel production
; =============================================================================
; This file is placed in /usr/local/etc/php/conf.d/ and loaded after the
; base production php.ini so only production-relevant values are set here.

; ─────────────────────────────────────────────────────────────────────────────
; OPcache — dramatically speeds up PHP by caching compiled bytecode
; ─────────────────────────────────────────────────────────────────────────────
opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=128
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.revalidate_freq=0          ; Never recheck files — immutable container
opcache.validate_timestamps=0      ; Disable file-change checking (production)
opcache.save_comments=1            ; Required for Laravel annotations/doctrine

; ─────────────────────────────────────────────────────────────────────────────
; File upload & execution limits
; ─────────────────────────────────────────────────────────────────────────────
upload_max_filesize = 50M
post_max_size       = 52M
max_execution_time  = 300
max_input_time      = 300
memory_limit        = 256M

; ─────────────────────────────────────────────────────────────────────────────
; Timezone
; ─────────────────────────────────────────────────────────────────────────────
date.timezone = UTC

; ─────────────────────────────────────────────────────────────────────────────
; Error display (off in production — errors go to logs)
; ─────────────────────────────────────────────────────────────────────────────
display_errors = Off
log_errors     = On
error_log      = /proc/self/fd/2

; ─────────────────────────────────────────────────────────────────────────────
; Session
; ─────────────────────────────────────────────────────────────────────────────
session.gc_maxlifetime = 7200
