; =============================================================================
; www.conf — PHP-FPM pool configuration for Laravel
; =============================================================================
; Placed at /usr/local/etc/php-fpm.d/www.conf inside the container.
; The official php:8.4-fpm-bookworm Docker image ships its own www.conf that
; already listens on 0.0.0.0:9000, so this file is an explicit, documented
; override that ensures the configuration is exactly what we expect.

[www]
user  = www-data
group = www-data

; Listen on TCP (Nginx connects via 127.0.0.1:9000)
listen = 127.0.0.1:9000

; Process management
pm                   = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests      = 500

; Logging — send slow-log & error output to Docker's stderr
php_admin_value[error_log]  = /proc/self/fd/2
php_admin_flag[log_errors]  = on

; Pass environment variables through to PHP (required for Laravel env())
clear_env = no

; Timeouts
request_terminate_timeout = 300
